<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNListings | Create Listing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        :root { --campus-red: #9f1239; --campus-red-dark: #7f1d1d; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-rose-50 to-white text-gray-800">

    <!-- ═══════ Navbar ═══════ -->
    <header class="bg-[var(--campus-red)] text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
            <a href="/" class="text-2xl font-extrabold hover:opacity-90 no-underline text-white">UNListings</a>
            <div class="flex-grow"></div>
            <nav class="flex items-center gap-3 text-sm font-semibold">
                <a href="/profile" class="px-3 py-1.5 rounded border border-rose-200 hover:bg-rose-800 text-white no-underline">Hi, {{ current_user.name }}</a>
            </nav>
        </div>
    </header>

    <!-- ═══════ Form ═══════ -->
    <main class="max-w-2xl mx-auto px-4 py-10">
        <a href="/" class="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 text-sm font-semibold mb-6">← Back to Auctions</a>

        <div class="bg-white border border-rose-200 rounded-xl shadow-sm p-8">
            <h1 class="text-2xl font-black text-gray-900 mb-1">Create an Auction Listing</h1>
            <p class="text-sm text-gray-500 mb-8">Fill out the details below to list your item for auction.</p>

            <form id="sell-form" class="space-y-5">
                <!-- Title -->
                <div>
                    <label for="title" class="block text-sm font-semibold text-gray-700 mb-1">Title</label>
                    <input id="title" type="text" required maxlength="255" placeholder="e.g. TI-84 Calculator"
                           class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent">
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                    <textarea id="description" rows="4" maxlength="2000" placeholder="Describe condition, what's included, etc."
                              class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent resize-y"></textarea>
                </div>

                <!-- Category -->
                <div>
                    <label for="category" class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                    <select id="category" required
                            class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent bg-white">
                        <option value="" disabled selected>Select a category</option>
                        <option value="educational-items">Educational Items</option>
                        <option value="university-merch">University Merch</option>
                        <option value="dorm-essentials">Dorm Essentials</option>
                        <option value="general-auction">General Auction</option>
                    </select>
                </div>

                <!-- Price & Duration row -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="starting-price" class="block text-sm font-semibold text-gray-700 mb-1">Starting Price ($)</label>
                        <input id="starting-price" type="number" step="0.01" min="0.01" required placeholder="5.00"
                               class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent">
                    </div>
                    <div>
                        <label for="duration" class="block text-sm font-semibold text-gray-700 mb-1">Duration (hours)</label>
                        <select id="duration"
                                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent bg-white">
                            <option value="1">1 hour</option>
                            <option value="3">3 hours</option>
                            <option value="6">6 hours</option>
                            <option value="12">12 hours</option>
                            <option value="24" selected>24 hours</option>
                            <option value="48">2 days</option>
                            <option value="72">3 days</option>
                            <option value="168">7 days</option>
                        </select>
                    </div>
                </div>

                <!-- Message -->
                <p id="message" class="hidden rounded-lg px-4 py-3 text-sm font-medium"></p>

                <!-- Submit -->
                <button type="submit" id="submit-btn"
                        class="w-full bg-[var(--campus-red)] hover:bg-[var(--campus-red-dark)] text-white py-3 rounded-lg font-bold text-sm transition-all shadow-sm">
                    Create Listing
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-rose-950 text-rose-100 py-10 text-center mt-16">
        <p class="text-sm opacity-75">&copy; 2026 UNListings</p>
    </footer>

    <script>
    (function () {
        const form    = document.getElementById('sell-form');
        const msg     = document.getElementById('message');
        const btn     = document.getElementById('submit-btn');

        function showMsg(text, isError) {
            msg.textContent = text;
            msg.className = 'rounded-lg px-4 py-3 text-sm font-medium ' +
                (isError ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200');
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Creating…';

            const body = {
                title:          document.getElementById('title').value.trim(),
                description:    document.getElementById('description').value.trim(),
                category:       document.getElementById('category').value,
                starting_price: parseFloat(document.getElementById('starting-price').value),
                duration_hours: parseInt(document.getElementById('duration').value, 10),
            };

            try {
                const res = await fetch('/api/listings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg('Listing created! Redirecting…', false);
                    setTimeout(function () {
                        window.location.href = '/listing/' + data.listing_id;
                    }, 800);
                } else {
                    showMsg(data.error || 'Something went wrong.', true);
                    btn.disabled = false;
                    btn.textContent = 'Create Listing';
                }
            } catch (err) {
                showMsg('Network error. Try again.', true);
                btn.disabled = false;
                btn.textContent = 'Create Listing';
            }
        });
    })();
    </script>
</body>
</html>
